<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>বাংলাদেশি লাইভ টিভি ও স্পোর্টস</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://vjs.zencdn.net/8.3.0/video-js.css" rel="stylesheet" />
    
    <style>
        body {
            font-family: 'Hind Siliguri', sans-serif;
            background-color: #000000; /* পিওর ব্ল্যাক ব্যাকগ্রাউন্ড */
            color: #ffffff;
            padding-bottom: 50px;
        }
        .player-container {
            background-color: #0a0a0a;
            border: 1px solid #1a1a1a;
            border-radius: 12px;
            padding: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.9);
            margin-bottom: 30px;
            overflow: hidden;
        }
        /* শক্তিশালী ও আধুনিক ভিডিও প্লেয়ার সাইজ */
        .video-js {
            width: 100% !important;
            height: auto;
            aspect-ratio: 16/9;
            border-radius: 8px;
        }
        .section-title {
            font-size: 1.25rem;
            font-weight: 700;
            color: #00f2fe;
            border-left: 4px solid #00f2fe;
            padding-left: 10px;
            margin-bottom: 20px;
            margin-top: 20px;
        }
        /* আপনার সেই আগের চেনা সুন্দর সিরিয়াল গ্রিড কার্ড */
        .channel-card {
            background-color: #0a0a0a;
            border: 1px solid #1a1a1a;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .channel-card:hover {
            transform: scale(1.04);
            background-color: #141414;
            border-color: #00f2fe;
        }
        .channel-logo {
            font-size: 1.8rem;
        }
        .live-pulse {
            display: inline-block;
            width: 8px;
            height: 8px;
            background-color: #ef4444;
            border-radius: 50%;
            margin-right: 5px;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(239, 68, 68, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }
    </style>
</head>
<body>

    <div class="container text-center my-4">
        <h2 class="fw-bold text-info"><i class="fa-solid fa-satellite-dish me-2"></i>বাংলাদেশি লাইভ টিভি চ্যানেল</h2>
    </div>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="player-container">
                    <video id="tv-player" class="video-js vjs-default-skin vjs-big-play-centered" controls preload="auto" data-setup='{}'>
                        <source src="https://live.bongobd.com/bongobd-tv-channels/somoy_tv_source/playlist.m3u8" type="application/x-mpegURL">
                    </video>
                    <div class="p-2 mt-2 border-top border-dark">
                        <h5 id="playing-title" class="mb-0 text-warning">● বর্তমানে চলছে: সময় টিভি</h5>
                    </div>
                </div>
            </div>
        </div>

        <div class="row justify-content-center">
            <div class="col-lg-8">
                
                <h4 class="section-title">চলতি লাইভ খেলা</h4>
                <div class="row g-3 mb-4">
                    <div class="col-6 col-sm-4">
                        <div class="channel-card p-3 text-center" onclick="changeChannel('BD vs AUS Live Match', 'https://raw.githubusercontent.com/theonlyandone/IPTV-Bangladesh/main/streams/tsports.m3u8')">
                            <div class="channel-logo mb-2 text-danger"><i class="fa-solid fa-circle-play"></i></div>
                            <h6 class="mb-0 fw-bold">BD vs AUS Live</h6>
                            <small class="text-danger fw-bold"><span class="live-pulse"></span>Live Now</small>
                        </div>
                    </div>
                </div>

                <h4 class="section-title">বাংলাদেশি লাইভ টিভি চ্যানেল</h4>
                <div class="row g-3">
                    
                    <div class="col-6 col-sm-4">
                        <div class="channel-card p-3 text-center" onclick="changeChannel('সময় টিভি', 'https://live.bongobd.com/bongobd-tv-channels/somoy_tv_source/playlist.m3u8')">
                            <div class="channel-logo mb-2 text-warning"><i class="fa-solid fa-newspaper"></i></div>
                            <h6 class="mb-0 fw-bold">সময় টিভি</h6>
                            <small class="text-muted">খবর</small>
                        </div>
                    </div>

                    <div class="col-6 col-sm-4">
                        <div class="channel-card p-3 text-center" onclick="changeChannel('যমুনা টিভি', 'https://live.bongobd.com/bongobd-tv-channels/jamuna_tv_source/playlist.m3u8')">
                            <div class="channel-logo mb-2 text-info"><i class="fa-solid fa-bolt"></i></div>
                            <h6 class="mb-0 fw-bold">যমুনা টিভি</h6>
                            <small class="text-muted">খবর</small>
                        </div>
                    </div>

                    <div class="col-6 col-sm-4">
                        <div class="channel-card p-3 text-center" onclick="changeChannel('জিটিভি (GTV)', 'https://live.bongobd.com/bongobd-tv-channels/gtv_source/playlist.m3u8')">
                            <div class="channel-logo mb-2 text-primary"><i class="fa-solid fa-star"></i></div>
                            <h6 class="mb-0 fw-bold">জিটিভি (GTV)</h6>
                            <small class="text-muted">বিনোদন ও খেলা</small>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </div>

    <script src="https://vjs.zencdn.net/8.3.0/video.min.js"></script>

    <script>
        function changeChannel(name, url) {
            document.getElementById('playing-title').innerText = "● বর্তমানে চলছে: " + name;
            
            // কোনো থার্ড পার্টি সাইট ছাড়া সরাসরি ব্রাউজারে m3u8 প্লে করার আধুনিক নিয়ম
            var player = videojs('tv-player');
            player.src({
                src: url,
                type: 'application/x-mpegURL'
            });
            player.play();
            
            // ক্লিক করলে স্মুথলি প্লেয়ারের স্ক্রিনে নিয়ে যাবে
            window.scrollTo({top: 0, behavior: 'smooth'});
        }
    </script>
</body>
</html>
