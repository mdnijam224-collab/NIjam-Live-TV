<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BD LIVE TV - Premium Streaming Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@0.5.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://vjs.zencdn.net/8.3.0/video-js.css" rel="stylesheet" />
    
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            --card-bg: rgba(255, 255, 255, 0.04);
            --card-border: rgba(255, 255, 255, 0.08);
            --primary-color: #6366f1;
            --accent-color: #06b6d4;
        }

        body {
            font-family: 'Hind Siliguri', sans-serif;
            background: var(--bg-gradient);
            color: #f8fafc;
            min-height: 100vh;
            padding-bottom: 50px;
        }

        .navbar-brand {
            font-weight: 700;
            letter-spacing: 1px;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Video Player Wrapper */
        .player-wrapper {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5), 0 0 30px rgba(99, 102, 241, 0.1);
        }

        .video-js {
            width: 100% !important;
            height: auto;
            aspect-ratio: 16/9;
        }

        .current-playing-title {
            background: rgba(255, 255, 255, 0.03);
            border-top: 1px solid var(--card-border);
            padding: 15px 20px;
            font-size: 1.1rem;
            font-weight: 600;
        }

        /* Section Title */
        .section-title {
            font-size: 1.25rem;
            font-weight: 700;
            position: relative;
            padding-left: 15px;
            margin-bottom: 25px;
            color: #e2e8f0;
        }

        .section-title::before {
            content: '';
            position: absolute;
            left: 0;
            top: 4px;
            bottom: 4px;
            width: 4px;
            background: linear-gradient(to bottom, var(--primary-color), var(--accent-color));
            border-radius: 4px;
        }

        /* Premium Channel Card */
        .channel-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            cursor: pointer;
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(5px);
        }

        .channel-card:hover {
            transform: translateY(-8px);
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(99, 102, 241, 0.4);
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.3), 0 0 20px rgba(99, 102, 241, 0.15);
        }

        .channel-card:active {
            transform: scale(0.95);
        }

        .icon-box {
            width: 60px;
            height: 60px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            font-size: 1.6rem;
            transition: all 0.3s ease;
        }

        .channel-card:hover .icon-box {
            background: rgba(99, 102, 241, 0.2);
            color: #fff !important;
        }

        /* Live Badge Animation */
        .live-pulse {
            display: inline-block;
            width: 8px;
            height: 8px;
            background-color: #ef4444;
            border-radius: 50%;
            margin-right: 6px;
            box-shadow: 0 0 0 rgba(239, 68, 68, 0.4);
            animation: pulse 1.5s infinite;
            vertical-align: middle;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }

        .badge-live {
            background: rgba(239, 68, 68, 0.15);
            color: #fca5a5;
            border: 1px solid rgba(239, 68, 68, 0.2);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-dark bg-transparent py-4">
        <div class="container text-center justify-content-center">
            <span class="navbar-brand mb-0 h1 fs-2"><i class="fa-solid fa-play-circle me-2"></i>BD LIVE TV</span>
        </div>
    </nav>

    <div class="container">
        <div class="row justify-content-center mb-5">
            <div class="col-lg-9">
                <div class="player-wrapper">
                    <video id="my-video" class="video-js vjs-default-skin vjs-big-play-centered" controls preload="auto" data-setup='{}'>
                        <source src="https://live.bongobd.com/bongobd-tv-channels/somoy_tv_source/playlist.m3u8" type="application/x-mpegURL">
                    </video>
                    <div class="current-playing-title d-flex align-items-center justify-content-between">
                        <span><i class="fa-solid fa-satellite-dish text-primary me-2"></i> বর্তমানে চলছে: <span id="channel-name" class="text-info">সময় টিভি</span></span>
                        <span class="badge bg-primary px-3 py-2 rounded-pill" style="font-size: 0.8rem;">Ultra HD</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="row justify-content-center mb-4">
            <div class="col-lg-9">
                <h5 class="section-title">চলতি লাইভ খেলা</h5>
                <div class="row g-4">
                    
                    <div class="col-6 col-md-4">
                        <div class="channel-card p-4 text-center" onclick="changeChannel('BD vs AUS Live Match', 'http://45.249.187.238:8081/hls/live5.m3u8')">
                            <div class="icon-box text-danger">
                                <i class="fa-solid fa-circle-play"></i>
                            </div>
                            <h6 class="mb-2 fw-bold text-white">BD vs AUS Live</h6>
                            <span class="badge-live"><span class="live-pulse"></span>LIVE NOW</span>
                        </div>
                    </div>

                </div>
            </div>
        </div>

        <div class="row justify-content-center">
            <div class="col-lg-9">
                <h5 class="section-title">বাংলাদেশি লাইভ টিভি চ্যানেল</h5>
                <div class="row g-4">
                    
                    <div class="col-6 col-md-4">
                        <div class="channel-card p-4 text-center" onclick="changeChannel('সময় টিভি', 'https://live.bongobd.com/bongobd-tv-channels/somoy_tv_source/playlist.m3u8')">
                            <div class="icon-box text-warning">
                                <i class="fa-solid fa-newspaper"></i>
                            </div>
                            <h6 class="mb-1 fw-bold text-white">সময় টিভি</h6>
                            <small class="text-muted">খবর</small>
                        </div>
                    </div>

                    <div class="col-6 col-md-4">
                        <div class="channel-card p-4 text-center" onclick="changeChannel('যমুনা টিভি', 'https://live.bongobd.com/bongobd-tv-channels/jamuna_tv_source/playlist.m3u8')">
                            <div class="icon-box text-info">
                                <i class="fa-solid fa-bolt"></i>
                            </div>
                            <h6 class="mb-1 fw-bold text-white">যমুনা টিভি</h6>
                            <small class="text-muted">খবর</small>
                        </div>
                    </div>

                    <div class="col-6 col-md-4">
                        <div class="channel-card p-4 text-center" onclick="changeChannel('জিটিভি (GTV)', 'https://live.bongobd.com/bongobd-tv-channels/gtv_source/playlist.m3u8')">
                            <div class="icon-box text-primary">
                                <i class="fa-solid fa-star"></i>
                            </div>
                            <h6 class="mb-1 fw-bold text-white">জিটিভি (GTV)</h6>
                            <small class="text-muted">বিনোদন ও খেলা</small>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </div>

    <script src="https://vjs.zencdn.net/8.3.0/video.min.js"></script>

    <script>
        function changeChannel(name, url) {
            // চ্যানেলের নাম পরিবর্তন
            document.getElementById('channel-name').innerText = name;
            
            // প্লেয়ারে নতুন লিংক লোড করা
            var player = videojs('my-video');
            player.src({
                src: url,
                type: 'application/x-mpegURL'
            });
            player.play();
            
            // ক্লিক করার পর অটোমেটিক স্ক্রিন স্ক্রোল করে প্লেয়ারের কাছে নিয়ে যাবে
            window.scrollTo({top: 0, behavior: 'smooth'});
        }
    </script>
</body>
</html>
