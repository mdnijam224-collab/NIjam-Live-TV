<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HASTV - Premium OTT & Live Streaming</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Hind Siliguri', sans-serif;
            background-color: #0b0b0b;
            color: #ffffff;
            padding-bottom: 90px;
        }

        /* প্রফেশনাল এবং উজ্জ্বল টপ হেডার */
        .main-header {
            background: linear-gradient(180deg, #3a0640 0%, #0b0b0b 100%);
            padding: 15px;
            position: sticky;
            top: 0;
            z-index: 1050;
            border-bottom: 1px solid #222;
        }
        .header-top-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        /* টপে বড় করে সাইটের নাম */
        .site-branding-title {
            font-size: 1.8rem;
            font-weight: 800;
            color: #00f2fe;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 15px rgba(0, 242, 254, 0.8);
            text-decoration: none;
        }
        .site-branding-title:hover {
            color: #ffffff;
        }
        .header-action-icons {
            display: flex;
            gap: 20px;
            font-size: 1.3rem;
        }
        .header-action-icons i {
            color: #b3b3b3;
            cursor: pointer;
            transition: color 0.2s;
        }
        .header-action-icons i:hover {
            color: #00f2fe;
        }

        /* সার্চ বার স্টাইল */
        .search-box-container {
            display: none;
            margin-bottom: 12px;
        }
        .search-input {
            background-color: #161616;
            border: 1px solid #333;
            color: #fff;
            border-radius: 20px;
            padding: 8px 20px;
        }
        .search-input:focus {
            background-color: #222;
            border-color: #00f2fe;
            color: #fff;
            box-shadow: none;
        }

        /* ওটিটি ক্যাটাগরি মেনু */
        .nav-tabs-scroll {
            display: flex;
            gap: 25px;
            overflow-x: auto;
            white-space: nowrap;
            scrollbar-width: none;
        }
        .nav-tabs-scroll::-webkit-scrollbar {
            display: none;
        }
        .tab-item-link {
            color: #b3b3b3;
            text-decoration: none;
            font-size: 1.1rem;
            font-weight: 600;
            padding-bottom: 5px;
        }
        .tab-item-link.active {
            color: #ffffff;
            border-bottom: 3px solid #00f2fe;
        }

        /* স্ট্যান্ডার্ড ছোট সাইজের রেসপন্সিভ প্লেয়ার কন্টেইনার */
        .video-section-container {
            max-width: 800px;
            margin: 15px auto;
            padding: 0 10px;
        }
        .player-frame-wrapper {
            background-color: #000;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #222;
            box-shadow: 0 8px 24px rgba(0,0,0,0.9);
        }
        iframe {
            width: 100%;
            aspect-ratio: 16/9;
            border: none;
        }
        .current-play-bar {
            background-color: #121212;
            padding: 10px 15px;
            font-size: 0.95rem;
            color: #ffc107;
            font-weight: 600;
            border-top: 1px solid #222;
        }

        /* চ্যানেল রো এবং সেকশন শিরোনাম */
        .section-main-title {
            font-size: 1.25rem;
            font-weight: 700;
            margin: 25px 0 15px 0;
            color: #ffffff;
            border-left: 4px solid #00f2fe;
            padding-left: 10px;
        }
        .circle-channels-row {
            display: flex;
            gap: 18px;
            overflow-x: auto;
            padding: 10px 0;
            scrollbar-width: none;
        }
        .circle-channels-row::-webkit-scrollbar {
            display: none;
        }

        /* গোল আইকন ও লোগো ডিজাইন */
        .channel-circle-card {
            flex: 0 0 auto;
            text-align: center;
            width: 90px;
            position: relative;
        }
        .logo-circle-frame {
            width: 80px;
            height: 80px;
            background-color: #161616;
            border-radius: 50%;
            border: 2px solid #333;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            margin: 0 auto;
            transition: all 0.2s ease;
            cursor: pointer;
        }
        .channel-circle-card:hover .logo-circle-frame {
            transform: scale(1.05);
            border-color: #00f2fe;
        }
        .logo-circle-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .channel-label-name {
            font-size: 0.85rem;
            margin-top: 8px;
            color: #cfcfcf;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* বুকমার্ক / ফেভারিট লাভ বাটন স্টাইল */
        .fav-heart-btn {
            position: absolute;
            top: -2px;
            right: 2px;
            background-color: rgba(0, 0, 0, 0.7);
            border-radius: 50%;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            color: #ff4757;
            cursor: pointer;
            border: 1px solid #333;
            z-index: 10;
        }

        /* মোবাইল বটম নেভিগেশন অ্যাপ বার */
        .bottom-app-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background-color: #121212;
            border-top: 1px solid #222;
            display: flex;
            justify-content: space-around;
            padding: 12px 0;
            z-index: 1040;
        }
        .bottom-nav-btn {
            text-align: center;
            color: #8e8e93;
            text-decoration: none;
            font-size: 0.8rem;
            cursor: pointer;
            background: none;
            border: none;
        }
        .bottom-nav-btn.active, .bottom-nav-btn:hover {
            color: #ffffff;
        }
        .bottom-nav-btn i {
            font-size: 1.3rem;
            display: block;
            margin-bottom: 4px;
        }

        /* সাইন ইন মোডাল কাস্টমাইজেশন */
        .modal-content-custom {
            background-color: #161616;
            color: #fff;
            border: 1px solid #333;
            border-radius: 16px;
        }
        .modal-input-style {
            background-color: #222;
            border: 1px solid #444;
            color: #fff;
        }
        .modal-input-style:focus {
            background-color: #262626;
            color: #fff;
            border-color: #00f2fe;
            box-shadow: none;
        }
    </style>
</head>
<body>

    <div class="main-header">
        <div class="header-top-row">
            <a href="javascript:void(0)" onclick="goToHome()" class="site-title site-branding-title">HASTV</a>
            
            <div class="header-action-icons">
                <i class="fa-solid fa-magnifying-glass" onclick="toggleSearchBox()" title="সার্চ করুন"></i>
                <i class="fa-solid fa-circle-user" data-bs-toggle="modal" data-bs-target="#authModal" id="userAccountBtn" title="সাইন-ইন"></i>
            </div>
        </div>

        <div class="search-box-container" id="searchBoxContainer">
            <input type="text" class="form-control search-input" id="channelSearchInput" placeholder="চ্যানেলের নাম লিখে খুঁজুন..." onkeyup="filterChannels()">
        </div>

        <div class="nav-tabs-scroll">
            <a href="javascript:void(0)" class="tab-item-link active" onclick="goToHome()">Live TV</a>
            <a href="javascript:void(0)" class="tab-item-link">Sports</a>
            <a href="javascript:void(0)" class="tab-item-link">Drama</a>
            <a href="javascript:void(0)" class="tab-item-link">Movies</a>
        </div>
    </div>

    <div class="video-section-container">
        <div class="player-frame-wrapper">
            <iframe id="mainStreamingPlayer" src="https://www.youtube.com/embed/live_stream?channel=UC8_zZfD6z7O2I7S0fEAsDVA&autoplay=1&mute=1" allow="autoplay; encrypted-media" allowfullscreen></iframe>
            <div class="current-play-bar" id="currentPlayingLabel">
                <i class="fa-solid fa-circle-play me-1"></i> বর্তমানে চলছে: BD vs AUS Live Match
            </div>
        </div>
    </div>

    <div class="container-fluid px-3">

        <div id="bookmarkSectionWrapper" style="display: none;">
            <div class="section-main-title text-warning"><i class="fa-solid fa-heart me-1"></i> My Bookmarked Channels</div>
            <div class="circle-channels-row" id="bookmarkedChannelsContainer">
                </div>
        </div>

        <div class="section-main-title">Sports Channels</div>
        <div class="circle-channels-row" id="sportsRow">
            
            <div class="channel-circle-card" data-name="bd vs aus cricket live match">
                <div class="fav-heart-btn" onclick="toggleBookmark('ch1', 'BD vs AUS', 'https://raw.githubusercontent.com/theonlyandone/IPTV-Bangladesh/main/logos/tsports.png', 'UC8_zZfD6z7O2I7S0fEAsDVA')"><i class="fa-solid fa-heart" id="heart-ch1"></i></div>
                <div class="logo-circle-frame" onclick="playChannel('BD vs AUS Live Match', 'UC8_zZfD6z7O2I7S0fEAsDVA')">
                    <img src="https://raw.githubusercontent.com/theonlyandone/IPTV-Bangladesh/main/logos/tsports.png" alt="T Sports">
                </div>
                <div class="channel-label-name">BD vs AUS</div>
            </div>

            <div class="channel-circle-card" data-name="sony sports 1 hd">
                <div class="fav-heart-btn" onclick="toggleBookmark('ch2', 'Sony Sports 1', 'https://placehold.co/100x100/222/fff?text=SONY+1', 'UC6_Y77FbtA76A96E49E1p6A')"><i class="fa-solid fa-heart" id="heart-ch2"></i></div>
                <div class="logo-circle-frame" onclick="playChannel('Sony Sports 1', 'UC6_Y77FbtA76A96E49E1p6A')">
                    <img src="https://placehold.co/100x100/222/fff?text=SONY+1" alt="Sony 1">
                </div>
                <div class="channel-name channel-label-name">Sony Sports 1</div>
            </div>

        </div>

        <div class="section-main-title">বাংলাদেশি চ্যানেল</div>
        <div class="circle-channels-row" id="banglaRow">
            
            <div class="channel-circle-card" data-name="jamuna tv যমুনা টিভি">
                <div class="fav-heart-btn" onclick="toggleBookmark('ch3', 'যমুনা টিভি', 'https://raw.githubusercontent.com/theonlyandone/IPTV-Bangladesh/main/logos/jamunatv.png', 'UCN6sm8iHiPd0cnoUardDAnw')"><i class="fa-solid fa-heart" id="heart-ch3"></i></div>
                <div class="logo-circle-frame" onclick="playChannel('যমুনা টিভি', 'UCN6sm8iHiPd0cnoUardDAnw')">
                    <img src="https://raw.githubusercontent.com/theonlyandone/IPTV-Bangladesh/main/logos/jamunatv.png" alt="Jamuna TV">
                </div>
                <div class="channel-label-name">যমুনা টিভি</div>
            </div>

            <div class="channel-circle-card" data-name="somoy tv সময় টিভি">
                <div class="fav-heart-btn" onclick="toggleBookmark('ch4', 'সময় টিভি', 'https://raw.githubusercontent.com/theonlyandone/IPTV-Bangladesh/main/logos/somoytv.png', 'UCxHoBXkY88Tb8z1Ssj6CWsQ')"><i class="fa-solid fa-heart" id="heart-ch4"></i></div>
                <div class="logo-circle-frame" onclick="playChannel('সময় টিভি', 'UCxHoBXkY88Tb8z1Ssj6CWsQ')">
                    <img src="https://raw.githubusercontent.com/theonlyandone/IPTV-Bangladesh/main/logos/somoytv.png" alt="Somoy TV">
                </div>
                <div class="channel-label-name">সময় টিভি</div>
            </div>

            <div class="channel-circle-card" data-name="ntv ntv এনটিভি">
                <div class="fav-heart-btn" onclick="toggleBookmark('ch5', 'NTV', 'https://raw.githubusercontent.com/theonlyandone/IPTV-Bangladesh/main/logos/ntv.png', 'UCG664uU_Isk0v_G_bK0s7Xg')"><i class="fa-solid fa-heart" id="heart-ch5"></i></div>
                <div class="logo-circle-frame" onclick="playChannel('এনটিভি (NTV)', 'UCG664uU_Isk0v_G_bK0s7Xg')">
                    <img src="https://raw.githubusercontent.com/theonlyandone/IPTV-Bangladesh/main/logos/ntv.png" alt="NTV">
                </div>
                <div class="channel-label-name">NTV</div>
            </div>

            <div class="channel-circle-card" data-name="news 24 নিউজ ২৪">
                <div class="fav-heart-btn" onclick="toggleBookmark('ch6', 'News 24', 'https://raw.githubusercontent.com/theonlyandone/IPTV-Bangladesh/main/logos/news24.png', 'UCG_69mO_b_X0sZ8-w3jIn9g')"><i class="fa-solid fa-heart" id="heart-ch6"></i></div>
                <div class="logo-circle-frame" onclick="playChannel('নিউজ ২৪', 'UCG_69mO_b_X0sZ8-w3jIn9g')">
                    <img src="https://raw.githubusercontent.com/theonlyandone/IPTV-Bangladesh/main/logos/news24.png" alt="News 24">
                </div>
                <div class="channel-label-name">News 24</div>
            </div>

        </div>
    </div>

    <div class="bottom-app-bar">
        <button class="bottom-nav-btn active" onclick="goToHome()">
            <i class="fa-solid fa-house"></i>Home
        </button>
        <button class="bottom-nav-btn" onclick="toggleSearchBox()">
            <i class="fa-solid fa-magnifying-glass"></i>Discover
        </button>
        <button class="bottom-nav-btn" onclick="scrollToBookmarks()">
            <i class="fa-solid fa-heart"></i>My List
        </button>
        <button class="bottom-nav-btn" data-bs-toggle="modal" data-bs-target="#authModal">
            <i class="fa-solid fa-circle-user"></i>Account
        </button>
    </div>

    <div class="modal fade" id="authModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content modal-content-custom">
                <div class="modal-header border-dark">
                    <h5 class="modal-title fw-bold text-info" id="authModalTitle">HASTV অ্যাকাউন্টে সাইন-ইন করুন</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-shadow="none" data-bs-dispels="modal" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div id="authFormWrapper">
                        <form id="loginForm" onsubmit="handleAuthSubmit(event)">
                            <div class="mb-3">
                                <label class="form-label small text-muted">আপনার নাম</label>
                                <input type="text" class="form-control modal-input-style" id="authName" required placeholder="যেমন: Md Nijam">
                            </div>
                            <div class="mb-3">
                                <label class="form-label small text-muted">ইমেইল ঠিকানা</label>
                                <input type="email" class="form-control modal-input-style" id="authEmail" required placeholder="name@example.com">
                            </div>
                            <button type="submit" class="btn btn-info w-100 fw-bold rounded-pill text-dark">অ্যাকাউন্ট তৈরি / লগইন করুন</button>
                        </form>
                    </div>
                    <div id="userProfileWrapper" style="display: none;" class="text-center py-3">
                        <i class="fa-solid fa-circle-user text-info mb-3" style="font-size: 4rem;"></i>
                        <h4 class="fw-bold" id="loggedInUserName">User Name</h4>
                        <p class="text-muted small" id="loggedInUserEmail">user@example.com</p>
                        <span class="badge bg-success mb-4 px-3 py-2 rounded-pill">Premium Subscriber</span>
                        <button class="btn btn-outline-danger w-100 fw-bold rounded-pill" onclick="handleLogout()">লগআউট করুন</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // বুকমার্ক ডাটাবেস হ্যান্ডলার (Local Storage)
        let bookmarks = JSON.parse(localStorage.getItem('hastv_bookmarks')) || [];

        document.addEventListener("DOMContentLoaded", function() {
            renderBookmarks();
            checkUserSession();
        });

        // ভিডিও চ্যানেল চেঞ্জ বাটন স্ক্রিপ্ট
        function playChannel(name, channelId) {
            var player = document.getElementById('mainStreamingPlayer');
            player.src = "https://www.youtube.com/embed/live_stream?channel=" + channelId + "&autoplay=1";
            document.getElementById('currentPlayingLabel').innerHTML = `<i class="fa-solid fa-circle-play me-1"></i> বর্তমানে চলছে: ${name}`;
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        // হোম বাটন স্ক্রিপ্ট
        function goToHome() {
            playChannel('BD vs AUS Live Match', 'UC8_zZfD6z7O2I7S0fEAsDVA');
            document.getElementById('channelSearchInput').value = '';
            filterChannels();
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        // সার্চ বক্স টগল ফাংশন
        function toggleSearchBox() {
            var box = document.getElementById('searchBoxContainer');
            if (box.style.display === 'block') {
                box.style.display = 'none';
            } else {
                box.style.display = 'block';
                document.getElementById('channelSearchInput').focus();
            }
        }

        // সার্চ লাইভ ফিল্টারিং স্ক্রিপ্ট
        function filterChannels() {
            let input = document.getElementById('channelSearchInput').value.toLowerCase();
            let cards = document.getElementsByClassName('channel-circle-card');
            
            for (let i = 0; i < cards.length; i++) {
                let name = cards[i].getAttribute('data-name');
                if (name.includes(input)) {
                    cards[i].style.display = "block";
                } else {
                    cards[i].style.display = "none";
                }
            }
        }

        // বুকমার্ক / ফেভারিট টগল করার মেইন ফাংশন
        function toggleBookmark(id, name, logo, channelId) {
            let index = bookmarks.findIndex(b => b.id === id);
            if (index > -1) {
                bookmarks.splice(index, 1);
                document.getElementById('heart-' + id).className = "fa-solid fa-heart";
                document.getElementById('heart-' + id).style.color = "#ff4757";
            } else {
                bookmarks.push({id, name, logo, channelId});
                document.getElementById('heart-' + id).style.color = "#ff4757";
            }
            localStorage.setItem('hastv_bookmarks', JSON.stringify(bookmarks));
            renderBookmarks();
        }

        // বুকমার্ক করা চ্যানেলগুলো স্ক্রিনে রেন্ডার করার স্ক্রিপ্ট
        function renderBookmarks() {
            let container = document.getElementById('bookmarkedChannelsContainer');
            let section = document.getElementById('bookmarkSectionWrapper');
            
            // সব হার্ট আইকন প্রথমে রিসেট করা
            let allHearts = document.querySelectorAll('.fav-heart-btn i');
            allHearts.forEach(h => h.style.color = '#fff');

            if (bookmarks.length === 0) {
                section.style.display = 'none';
                return;
            }

            section.style.display = 'block';
            container.innerHTML = '';

            bookmarks.forEach(ch => {
                // মেইন লিস্টের হার্ট লাল করা
                let mainHeart = document.getElementById('heart-' + ch.id);
                if(mainHeart) mainHeart.style.color = '#ff4757';

                container.innerHTML += `
                    <div class="channel-circle-card">
                        <div class="fav-heart-btn" style="color: #ff4757;" onclick="toggleBookmark('${ch.id}', '${ch.name}', '${ch.logo}', '${ch.channelId}')"><i class="fa-solid fa-trash-can"></i></div>
                        <div class="logo-circle-frame" onclick="playChannel('${ch.name}', '${ch.channelId}')">
                            <img src="${ch.logo}" alt="${ch.name}">
                        </div>
                        <div class="channel-label-name">${ch.name}</div>
                    </div>
                `;
            });
        }

        function scrollToBookmarks() {
            var section = document.getElementById('bookmarkSectionWrapper');
            if(section.style.display === 'block') {
                section.scrollIntoView({behavior: 'smooth'});
            } else {
                alert('আপনার লিস্টে কোনো ফেভারিট চ্যানেল যোগ করা নেই! চ্যানেলের হার্ট (❤️) আইকনে ক্লিক করে যুক্ত করুন।');
            }
        }

        // অ্যাকাউন্ট সাইন-ইন প্রসেসিং স্ক্রিপ্ট
        function handleAuthSubmit(e) {
            e.preventDefault();
            let name = document.getElementById('authName').value;
            let email = document.getElementById('authEmail').value;

            let user = { name, email };
            localStorage.setItem('hastv_user', JSON.stringify(user));
            checkUserSession();
        }

        function checkUserSession() {
            let session = localStorage.getItem('hastv_user');
            if (session) {
                let user = JSON.parse(session);
                document.getElementById('authFormWrapper').style.display = 'none';
                document.getElementById('userProfileWrapper').style.display = 'block';
                document.getElementById('authModalTitle').innerText = "আপনার প্রোফাইল";
                document.getElementById('loggedInUserName').innerText = user.name;
                document.getElementById('loggedInUserEmail').innerText = user.email;
                document.getElementById('userAccountBtn').className = "fa-solid fa-user-check text-success";
            } else {
                document.getElementById('authFormWrapper').style.display = 'block';
                document.getElementById('userProfileWrapper').style.display = 'none';
                document.getElementById('authModalTitle').innerText = "HASTV অ্যাকাউন্টে সাইন-ইন করুন";
                document.getElementById('userAccountBtn').className = "fa-solid fa-circle-user";
            }
        }

        function handleLogout() {
            localStorage.removeItem('hastv_user');
            checkUserSession();
        }
    </script>
</body>
</html>
