<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>লাইভ টিভি ও স্পোর্টস</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    
    <style>
        body {
            font-family: 'Hind Siliguri', sans-serif;
            background-color: #000000; /* পিওর ব্ল্যাক থিম */
            color: #ffffff;
            padding-bottom: 50px;
        }
        .player-container {
            background-color: #0c0c0c;
            border: 1px solid #1a1a1a;
            border-radius: 14px;
            padding: 8px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.9);
            margin-bottom: 35px;
        }
        video {
            width: 100%;
            aspect-ratio: 16/9;
            border-radius: 8px;
            background-color: #000000;
        }
        .section-title {
            font-size: 1.25rem;
            font-weight: 700;
            color: #00f2fe;
            border-left: 4px solid #00f2fe;
            padding-left: 10px;
            margin-bottom: 20px;
            margin-top: 25px;
        }
        /* প্রতিটি চ্যানেলের সিরিয়াল কার্ড */
        .channel-card {
            background-color: #0c0c0c;
            border: 1px solid #1a1a1a;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 140px;
        }
        .channel-card:hover {
            transform: translateY(-3px);
            background-color: #141414;
            border-color: #00f2fe;
        }
        /* লোগো ইমেজ স্টাইল */
        .channel-logo-img {
            height: 50px;
            max-width: 85%;
            object-fit: contain;
            margin-bottom: 10px;
            filter: drop-shadow(0px 4px 8px rgba(0, 0, 0, 0.5));
        }
        .live-pulse {
            display: inline-block;
            width: 8px;
            height: 8px;
            background-color: #ef4444;
            border-radius: 50%;
            margin-right: 6px;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(239, 68, 68, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }
    </style>
</head>
<body>

    <div class="container text-center my-4">
        <h2 class="fw-bold text-info"><i class="fa-solid fa-satellite-dish me-2"></i>বাংলাদেশি লাইভ টিভি চ্যানেল</h2>
    </div>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="player-container">
                    <video id="video-player" controls autoplay playsinline></video>
                    <div class="p-2 mt-2 border-top border-dark">
                        <h5 id="playing-title" class="mb-0 text-warning">● বর্তমানে চলছে: যমুনা টিভি</h5>
                    </div>
                </div>
            </div>
        </div>

        <div class="row justify-content-center">
            <div class="col-lg-8">
                
                <h4 class="section-title">চলতি লাইভ খেলা</h4>
                <div class="row g-3 mb-4">
                    <div class="col-6 col-sm-4">
                        <div class="channel-card p-3 text-center" onclick="playM3U8('BD vs AUS Live Match', 'https://bdiptv.stream/tsports/index.m3u8')">
                            <img src="https://raw.githubusercontent.com/theonlyandone/IPTV-Bangladesh/main/logos/tsports.png" alt="T-Sports" class="channel-logo-img">
                            <h6 class="mb-0 fw-bold" style="font-size: 0.95rem;">BD vs AUS Live</h6>
                            <small class="text-danger fw-bold mt-1"><span class="live-pulse"></span>Live Now</small>
                        </div>
                    </div>
                </div>

                <h4 class="section-title">বাংলাদেশি লাইভ টিভি চ্যানেল</h4>
                <div class="row g-3">
                    
                    <div class="col-6 col-sm-4">
                        <div class="channel-card p-3 text-center" onclick="playM3U8('যমুনা টিভি', 'https://live-cdn.chorki.com/live-tv/jamunatv/index.m3u8')">
                            <img src="https://raw.githubusercontent.com/theonlyandone/IPTV-Bangladesh/main/logos/jamunatv.png" alt="Jamuna TV" class="channel-logo-img">
                            <h6 class="mb-0 fw-bold" style="font-size: 0.95rem;">যমুনা টিভি</h6>
                            <small class="text-muted mt-1">খবর</small>
                        </div>
                    </div>

                    <div class="col-6 col-sm-4">
                        <div class="channel-card p-3 text-center" onclick="playM3U8('সময় টিভি', 'https://live-cdn.chorki.com/live-tv/somoytv/index.m3u8')">
                            <img src="https://raw.githubusercontent.com/theonlyandone/IPTV-Bangladesh/main/logos/somoytv.png" alt="Somoy TV" class="channel-logo-img">
                            <h6 class="mb-0 fw-bold" style="font-size: 0.95rem;">সময় টিভি</h6>
                            <small class="text-muted mt-1">খবর</small>
                        </div>
                    </div>

                    <div class="col-6 col-sm-4">
                        <div class="channel-card p-3 text-center" onclick="playM3U8('জিটিভি (GTV)', 'https://live-cdn.chorki.com/live-tv/gtv/index.m3u8')">
                            <img src="https://raw.githubusercontent.com/theonlyandone/IPTV-Bangladesh/main/logos/gtv.png" alt="GTV" class="channel-logo-img">
                            <h6 class="mb-0 fw-bold" style="font-size: 0.95rem;">জিটিভি (GTV)</h6>
                            <small class="text-muted mt-1">বিনোদন ও খেলা</small>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </div>

    <script>
        var video = document.getElementById('video-player');
        var hls;

        function playM3U8(name, url) {
            document.getElementById('playing-title').innerText = "● Actualmente চলছে: " + name;

            if (Hls.isSupported()) {
                if (hls) {
                    hls.destroy();
                }
                hls = new Hls();
                hls.loadSource(url);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, function() {
                    video.play().catch(function(e) { console.log("Autoplay blocked"); });
                });
            } else if (video.canPlayType('application/x-mpegURL') || video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = url;
                video.play().catch(function(e) { console.log("Autoplay blocked"); });
            }
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        // প্রথমবার সাইট ওপেন হলে স্বয়ংক্রিয়ভাবে যমুনা টিভি প্লে হবে
        window.onload = function() {
            playM3U8('যমুনা টিভি', 'https://live-cdn.chorki.com/live-tv/jamunatv/index.m3u8');
        };
    </script>
</body>
</html>
