<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HASTV - Live TV & Sports</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Hind Siliguri', sans-serif;
            background-color: #111111; /* ডিপ ডার্ক থিম */
            color: #ffffff;
            padding-bottom: 90px;
            user-select: none;
        }
        
        /* প্রফেশনাল ভিডিও প্লেয়ার কন্টেইনার */
        .player-wrapper {
            background-color: #000000;
            border-bottom: 1px solid #222222;
        }
        iframe {
            width: 100%;
            aspect-ratio: 16/9;
            border: none;
        }

        /* ওটিটি অ্যাপের মতো মেইন টপ বার */
        .header-main {
            background: linear-gradient(180deg, #4a0e4e 0%, #111111 100%);
            padding: 15px 15px 5px 15px;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .brand-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .site-title {
            font-size: 1.6rem;
            font-weight: 800;
            color: #00f2fe;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            text-shadow: 0 0 12px rgba(0, 242, 254, 0.6);
            text-decoration: none;
        }
        .header-icons {
            display: flex;
            gap: 18px;
            font-size: 1.2rem;
            color: #b3b3b3;
        }
        .header-icons i:hover {
            color: #ffffff;
            cursor: pointer;
        }

        /* ক্যাটাগরি মেনু বার */
        .nav-tabs-custom {
            display: flex;
            gap: 25px;
            overflow-x: auto;
            white-space: nowrap;
            scrollbar-width: none;
            padding-bottom: 5px;
        }
        .nav-tabs-custom::-webkit-scrollbar {
            display: none;
        }
        .nav-link-custom {
            color: #b3b3b3;
            text-decoration: none;
            font-size: 1.05rem;
            font-weight: 600;
            padding-bottom: 6px;
            position: relative;
        }
        .nav-link-custom.active {
            color: #ffffff;
        }
        .nav-link-custom.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 3px;
            background-color: #00f2fe;
            border-radius: 2px;
        }

        /* ওটিটি ব্যানার পোস্টার */
        .promo-banner {
            background: linear-gradient(rgba(0,0,0,0.1), rgba(17,17,17,1)), url('https://images.unsplash.com/photo-1508098682722-e99c43a406b2?q=80&w=1000&auto=format&fit=crop') no-repeat center center;
            background-size: cover;
            height: 180px;
            border-radius: 12px;
            margin: 15px 0;
            display: flex;
            align-items: flex-end;
            padding: 15px;
            box-shadow: inset 0 -40px 40px rgba(0,0,0,0.8);
        }

        .section-heading {
            font-size: 1.2rem;
            font-weight: 700;
            margin: 20px 0 15px 0;
            color: #ffffff;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .view-all {
            color: #b3b3b3;
            font-size: 0.9rem;
            text-decoration: none;
        }

        /* গোল লোগো ডিজাইন */
        .circle-grid {
            display: flex;
            gap: 15px;
            overflow-x: auto;
            padding: 5px 0;
            scrollbar-width: none;
        }
        .circle-grid::-webkit-scrollbar {
            display: none;
        }
        .circle-item {
            flex: 0 0 auto;
            text-align: center;
            width: 85px;
            cursor: pointer;
        }
        .circle-logo-wrapper {
            width: 80px;
            height: 80px;
            background-color: #1a1a1a;
            border-radius: 50%;
            border: 2px solid #333333;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            transition: all 0.2s ease;
            position: relative;
        }
        .circle-item:hover .circle-logo-wrapper {
            transform: scale(1.05);
            border-color: #00f2fe;
        }
        .circle-logo-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .channel-name {
            font-size: 0.85rem;
            margin-top: 8px;
            color: #e0e0e0;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* লাইভ ব্যাজ */
        .live-tag {
            position: absolute;
            bottom: 0;
            background-color: #ef4444;
            color: white;
            font-size: 0.65rem;
            padding: 1px 6px;
            border-radius: 4px;
            font-weight: bold;
        }

        /* বটম মোবাইল অ্যাপ নেভিগেশন বার */
        .bottom-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background-color: #161616;
            border-top: 1px solid #262626;
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
            z-index: 1000;
        }
        .bottom-item {
            text-align: center;
            color: #8e8e93;
            text-decoration: none;
            font-size: 0.8rem;
        }
        .bottom-item.active {
            color: #ffffff;
        }
        .bottom-item i {
            font-size: 1.3rem;
            display: block;
            margin-bottom: 3px;
        }
    </style>
</head>
<body>

    <div class="player-wrapper">
        <iframe id="app-player" src="https://www.youtube.com/embed/live_stream?channel=UCN6sm8iHiPd0cnoUardDAnw&autoplay=1&mute=1" allow="autoplay; encrypted-media" allowfullscreen></iframe>
    </div>

    <div class="header-main">
        <div class="brand-container">
            <a href="#" class="site-title">HASTV</a>
            <div class="header-icons">
                <i class="fa-solid fa-magnifying-glass"></i>
                <i class="fa-solid fa-bell"></i>
            </div>
        </div>
        <div class="nav-tabs-custom">
            <a href="#" class="nav-link-custom active">Live TV</a>
            <a href="#" class="nav-link-custom">Sports</a>
            <a href="#" class="nav-link-custom">Drama</a>
            <a href="#" class="nav-link-custom">Movies</a>
        </div>
    </div>

    <div class="container-fluid px-3">
        <div class="promo-banner">
            <div>
                <span class="badge bg-danger mb-2">PREMIUM</span>
                <h5 class="fw-bold mb-0 text-white">লাইভ স্পোর্টস ও বিনোদন এক সাথে</h5>
            </div>
        </div>

        <div class="section-heading">
            <span>Sports Channels</span>
            <a href="#" class="view-all">View All <i class="fa-solid fa-angle-right"></i></a>
        </div>
        <div class="circle-grid">
            <div class="circle-item" onclick="switchLive('BAN vs AUS Live', 'UC8_zZfD6z7O2I7S0fEAsDVA')">
                <div class="circle-logo-wrapper" style="border-color: #ef4444;">
                    <img src="https://raw.githubusercontent.com/theonlyandone/IPTV-Bangladesh/main/logos/tsports.png" class="circle-logo-img" alt="Sports">
                    <span class="live-tag">LIVE</span>
                </div>
                <div class="channel-name">BAN vs AUS</div>
            </div>
            <div class="circle-item" onclick="switchLive('Sony Sports 1', 'UC6_Y77FbtA76A96E49E1p6A')">
                <div class="circle-logo-wrapper">
                    <img src="https://placehold.co/100x100/222/fff?text=SONY+1" class="circle-logo-img" alt="Sony 1">
                </div>
                <div class="channel-name">Sony Sports 1</div>
            </div>
            <div class="circle-item" onclick="switchLive('Sony Sports 2', 'UCvC4ToK6X2y7Xm9H5m9eXgQ')">
                <div class="circle-logo-wrapper">
                    <img src="https://placehold.co/100x100/222/fff?text=SONY+2" class="circle-logo-img" alt="Sony 2">
                </div>
                <div class="channel-name">Sony Sports 2</div>
            </div>
        </div>

        <div class="section-heading">
            <span>বাংলাদেশি চ্যানেল</span>
            <a href="#" class="view-all">View All <i class="fa-solid fa-angle-right"></i></a>
        </div>
        <div class="circle-grid">
            <div class="circle-item" onclick="switchLive('যমুনা টিভি', 'UCN6sm8iHiPd0cnoUardDAnw')">
                <div class="circle-logo-wrapper">
                    <img src="https://raw.githubusercontent.com/theonlyandone/IPTV-Bangladesh/main/logos/jamunatv.png" class="circle-logo-img" alt="Jamuna">
                </div>
                <div class="channel-name">যমুনা টিভি</div>
            </div>
            <div class="circle-item" onclick="switchLive('সময় টিভি', 'UCxHoBXkY88Tb8z1Ssj6CWsQ')">
                <div class="circle-logo-wrapper">
                    <img src="https://raw.githubusercontent.com/theonlyandone/IPTV-Bangladesh/main/logos/somoytv.png" class="circle-logo-img" alt="Somoy">
                </div>
                <div class="channel-name">সময় টিভি</div>
            </div>
            <div class="circle-item" onclick="switchLive('এনটিভি (NTV)', 'UCG664uU_Isk0v_G_bK0s7Xg')">
                <div class="circle-logo-wrapper">
                    <img src="https://raw.githubusercontent.com/theonlyandone/IPTV-Bangladesh/main/logos/ntv.png" class="circle-logo-img" alt="NTV">
                </div>
                <div class="channel-name">NTV</div>
            </div>
            <div class="circle-item" onclick="switchLive('নিউজ ২৪', 'UCG_69mO_b_X0sZ8-w3jIn9g')">
                <div class="circle-logo-wrapper">
                    <img src="https://raw.githubusercontent.com/theonlyandone/IPTV-Bangladesh/main/logos/news24.png" class="circle-logo-img" alt="News24">
                </div>
                <div class="channel-name">News 24</div>
            </div>
        </div>
    </div>

    <div class="bottom-bar">
        <a href="#" class="bottom-item active"><i class="fa-solid fa-house"></i>Home</a>
        <a href="#" class="bottom-item"><i class="fa-solid fa-magnifying-glass"></i>Discover</a>
        <a href="#" class="bottom-item"><i class="fa-solid fa-plus"></i>My List</a>
        <a href="#" class="bottom-item"><i class="fa-solid fa-circle-user"></i>Subscribe</a>
    </div>

    <script>
        function switchLive(channelName, channelId) {
            var player = document.getElementById('app-player');
            player.src = "https://www.youtube.com/embed/live_stream?channel=" + channelId + "&autoplay=1";
            window.scrollTo({top: 0, behavior: 'smooth'});
        }
    </script>
</body>
</html>
