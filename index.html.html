<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>বাংলাদেশি লাইভ টিভি চ্যানেল</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Hind Siliguri', sans-serif;
            background-color: #000000; /* পিওর ব্ল্যাক থিম */
            color: #ffffff;
            padding-bottom: 50px;
        }
        .main-container {
            max-width: 800px;
            margin: 0 auto;
        }
        .section-title {
            font-size: 1.25rem;
            font-weight: 700;
            color: #00f2fe;
            border-left: 4px solid #00f2fe;
            padding-left: 10px;
            margin-bottom: 20px;
            margin-top: 30px;
        }
        /* আপনার সেই প্রিয় সিরিয়াল গ্রিড কার্ড */
        .channel-card {
            background-color: #0c0c0c;
            border: 1px solid #1a1a1a;
            border-radius: 12px;
            text-decoration: none;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 140px;
            transition: all 0.2s ease;
        }
        .channel-card:hover {
            transform: translateY(-4px);
            background-color: #141414;
            border-color: #00f2fe;
            color: #ffffff;
        }
        /* লোগো ইমেজ সাইজ */
        .channel-logo-img {
            height: 50px;
            max-width: 85%;
            object-fit: contain;
            margin-bottom: 10px;
        }
        .live-pulse {
            display: inline-block;
            width: 8px;
            height: 8px;
            background-color: #ef4444;
            border-radius: 50%;
            margin-right: 6px;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(239, 68, 68, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }
    </style>
</head>
<body>

    <div class="container text-center my-5">
        <h2 class="fw-bold text-info"><i class="fa-solid fa-satellite-dish me-2"></i>বাংলাদেশি লাইভ টিভি চ্যানেল</h2>
        <p class="text-muted small">যেকোনো চ্যানেলে ক্লিক করলেই সরাসরি অফিশিয়াল লাইভ চালু হবে</p>
    </div>

    <div class="container main-container">
        
        <h4 class="section-title">চলতি লাইভ খেলা</h4>
        <div class="row g-3 mb-4">
            
            <div class="col-6 col-sm-4">
                <a href="https://www.youtube.com/c/TSportsbd/live" target="_blank" class="channel-card p-3 text-center">
                    <img src="https://raw.githubusercontent.com/theonlyandone/IPTV-Bangladesh/main/logos/tsports.png" alt="T-Sports" class="channel-logo-img">
                    <h6 class="mb-0 fw-bold" style="font-size: 0.95rem;">BD vs AUS Live</h6>
                    <small class="text-danger fw-bold mt-1"><span class="live-pulse"></span>Live Now</small>
                </a>
            </div>

        </div>

        <h4 class="section-title">বাংলাদেশি লাইভ টিভি চ্যানেল</h4>
        <div class="row g-3">
            
            <div class="col-6 col-sm-4">
                <a href="https://www.youtube.com/c/JamunaTVchannel/live" target="_blank" class="channel-card p-3 text-center">
                    <img src="https://raw.githubusercontent.com/theonlyandone/IPTV-Bangladesh/main/logos/jamunatv.png" alt="Jamuna TV" class="channel-logo-img">
                    <h6 class="mb-0 fw-bold" style="font-size: 0.95rem;">যমুনা টিভি</h6>
                    <small class="text-muted mt-1">খবর</small>
                </a>
            </div>

            <div class="col-6 col-sm-4">
                <a href="https://www.youtube.com/c/SomoyTVNetnews/live" target="_blank" class="channel-card p-3 text-center">
                    <img src="https://raw.githubusercontent.com/theonlyandone/IPTV-Bangladesh/main/logos/somoytv.png" alt="Somoy TV" class="channel-logo-img">
                    <h6 class="mb-0 fw-bold" style="font-size: 0.95rem;">সময় টিভি</h6>
                    <small class="text-muted mt-1">খবর</small>
                </a>
            </div>

            <div class="col-6 col-sm-4">
                <a href="https://www.youtube.com/c/News24bdTv/live" target="_blank" class="channel-card p-3 text-center">
                    <img src="https://raw.githubusercontent.com/theonlyandone/IPTV-Bangladesh/main/logos/news24.png" alt="News 24" class="channel-logo-img">
                    <h6 class="mb-0 fw-bold" style="font-size: 0.95rem;">নিউজ ২৪</h6>
                    <small class="text-muted mt-1">খবর ও বিনোদন</small>
                </a>
            </div>

        </div>
    </div>

</body>
</html>
